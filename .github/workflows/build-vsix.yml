name: Build VSIX

on:
  pull_request:
    types: [opened, synchronize, labeled]

jobs:
  build-vsix:
    if: "contains(github.event.pull_request.labels.*.name, 'autorelease: pending')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.YC_UI_BOT_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install latest npm (>= 11.5.1)
        run: |
          [ "$(printf '%s\n' "11.5.1" "$(npm -v)" | sort -V | head -n1)" = "11.5.1" ] || npm install -g npm@11.5.1
        shell: bash

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: |
          rm -f *.vsix
          npm run compile
          npm run vsce

      - name: Commit VSIX to PR branch
        run: |
          git config user.name "yc-ui-bot"
          git config user.email "yc-ui-bot@users.noreply.github.com"
          git add -f *.vsix
          git diff --cached --quiet && exit 0
          git commit -m "chore: update vsix [skip ci]"
          git push
