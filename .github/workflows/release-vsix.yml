name: Release VSIX to Yandex Cloud S3

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish-vsix:
    name: Build and upload VSIX
    runs-on: ubuntu-latest
    if: github.event.release.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: diplodoc-platform/setup-node-action@v1
        with:
          node-version: ${{ vars.NODE_VERSION || '24' }}
          cache: ''
          run-install: 'false'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npm run vsce

      - name: Upload stable.vsix to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ru-central1
        run: |
          aws s3 cp *.vsix s3://vsc-extension/stable.vsix \
            --endpoint-url https://storage.yandexcloud.net
